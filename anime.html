<script>
/* ============================================================
   parseCSV — точно такая же версия, что в index.html v6
   (с фиксом проверки пустых финальных строк)
   ============================================================ */
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { cell += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c === '\r') {}
      else { cell += c; }
    }
  }
  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(c => c.length > 0)) rows.push(row);
  }
  return rows;
}

function rowsToViewers(rows) {
  if (rows.length < 2) return {};
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const nickIdx = headers.indexOf('nick');
  const avatarIdx = headers.indexOf('avatar_url');
  if (nickIdx < 0) return {};
  const map = {};
  rows.slice(1).forEach(r => {
    if (r.length > 0 && r[nickIdx] && r[nickIdx].trim()) {
      const nick = r[nickIdx].trim();
      map[nick.toLowerCase()] = {
        nick: nick,
        avatar: avatarIdx >= 0 ? (r[avatarIdx] || '').trim() : '',
      };
    }
  });
  return map;
}

function rowsToAnime(rows, viewersMap) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const idx = {
    nick:             headers.indexOf('nick'),
    title:            headers.indexOf('title'),
    format:           headers.indexOf('format'),
    episodes_total:   headers.indexOf('episodes_total'),
    episodes_watched: headers.indexOf('episodes_watched'),
    status:           headers.indexOf('status'),
    date_added:       headers.indexOf('date_added'),
    date_completed:   headers.indexOf('date_completed'),
    url:              headers.indexOf('url'),
    notes:            headers.indexOf('notes'),
  };
  if (idx.nick < 0 || idx.title < 0) return [];
  return rows.slice(1)
    .filter(r => r.length > 0 && r[idx.nick] && r[idx.nick].trim() && r[idx.title] && r[idx.title].trim())
    .map((r, i) => {
      const get = (col) => col >= 0 ? (r[col] || '').trim() : '';
      const nick = get(idx.nick);
      const viewer = viewersMap[nick.toLowerCase()] || {};
      const rawStatus = get(idx.status).toLowerCase();
      const status = ['pending', 'watching', 'watched'].includes(rawStatus) ? rawStatus : 'pending';
      const total = parseInt(get(idx.episodes_total), 10) || 0;
      const watched = parseInt(get(idx.episodes_watched), 10) || 0;
      const format = get(idx.format).toLowerCase();
      return {
        _order: i,
        nick: nick,
        avatar: viewer.avatar || '',
        title: get(idx.title),
        format: (format === 'dub' || format === 'sub') ? format : '',
        episodes_total: total,
        episodes_watched: watched,
        status: status,
        date_added: get(idx.date_added),
        date_completed: get(idx.date_completed),
        url: get(idx.url),
        notes: get(idx.notes),
      };
    });
}

const STATUS_WEIGHT = { watching: 0, pending: 1, watched: 2 };
function sortAnime(items) {
  return items.slice().sort((a, b) => {
    const sw = STATUS_WEIGHT[a.status] - STATUS_WEIGHT[b.status];
    if (sw !== 0) return sw;
    const ad = a.date_added || '';
    const bd = b.date_added || '';
    if (ad && bd && ad !== bd) return bd.localeCompare(ad);
    if (ad && !bd) return -1;
    if (!ad && bd) return 1;
    return a._order - b._order;
  });
}

function initials(nick) {
  const clean = nick.replace(/[^A-Za-zА-Яа-я0-9]/g, '');
  if (clean.length >= 2) return (clean[0] + clean[1]).toUpperCase();
  return (clean[0] || '?').toUpperCase();
}

function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  const palette = [
    '#7F77DD', '#FAC775', '#97C459', '#F0997B', '#88B4F5',
    '#C5A9F8', '#F38787', '#F0BC58', '#6FA13C', '#D85A30',
  ];
  return palette[Math.abs(h) % palette.length];
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

const MONTHS_RU = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
function formatShortDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getDate()} ${MONTHS_RU[d.getMonth()]} ${d.getFullYear()}`;
}

const STATUS_LABEL = {
  pending:  'В очереди',
  watching: 'Смотрим',
  watched:  'Просмотрено',
};

function buildAvatarHtml(item) {
  if (item.avatar) {
    return `<div class="acard__avatar" style="background-image:url('${esc(item.avatar)}');"></div>`;
  }
  const color = hashColor(item.nick.toLowerCase());
  return `<div class="acard__avatar" style="background:${color};">${esc(initials(item.nick))}</div>`;
}

function buildProgressHtml(item) {
  if (!item.episodes_total || item.episodes_total <= 0) return '';
  const watched = Math.max(0, item.episodes_watched);
  const clamped = Math.min(watched, item.episodes_total);
  const pct = Math.round((clamped / item.episodes_total) * 100);
  let fillClass = 'progress__fill--pending';
  if (item.status === 'watched') fillClass = 'progress__fill--watched';
  else if (clamped > 0) fillClass = 'progress__fill--watching';
  return `
    <div class="progress">
      <div class="progress__label">
        <span>${esc(watched)} / ${esc(item.episodes_total)} серий</span>
        <span class="pct">${pct}%</span>
      </div>
      <div class="progress__bar">
        <div class="progress__fill ${fillClass}" style="width:${pct}%;"></div>
      </div>
    </div>
  `;
}

function buildBadgesHtml(item) {
  const badges = [];
  if (item.format === 'dub') badges.push('<span class="badge badge--dub">DUB</span>');
  else if (item.format === 'sub') badges.push('<span class="badge badge--sub">SUB</span>');
  badges.push(`<span class="badge badge--${item.status}">${esc(STATUS_LABEL[item.status])}</span>`);
  if (item.date_completed) {
    badges.push(`<span class="acard__date">досмотрено ${esc(formatShortDate(item.date_completed))}</span>`);
  } else if (item.date_added && item.status !== 'watched') {
    badges.push(`<span class="acard__date">добавлено ${esc(formatShortDate(item.date_added))}</span>`);
  }
  return `<div class="acard__badges">${badges.join('')}</div>`;
}

function buildCard(item) {
  const titleInner = item.url
    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a>`
    : esc(item.title);
  const watchedClass = item.status === 'watched' ? ' is-watched' : '';
  return `
    <article class="acard${watchedClass}" data-status="${esc(item.status)}" data-title="${esc(item.title.toLowerCase())}">
      ${buildAvatarHtml(item)}
      <div class="acard__body">
        <div class="acard__top">
          <span class="acard__nick">${esc(item.nick)}</span>
        </div>
        <h2 class="acard__title">${titleInner}</h2>
        ${buildBadgesHtml(item)}
        ${buildProgressHtml(item)}
        ${item.notes ? `<p class="acard__notes">${esc(item.notes)}</p>` : ''}
      </div>
    </article>
  `;
}

let allItems = [];
let currentStatus = 'all';
let currentSearch = '';

function applyFilters() {
  const list = document.getElementById('list');
  const noResults = document.getElementById('no-results');
  const shown = document.getElementById('shown-count');

  let visible = 0;
  list.querySelectorAll('.acard').forEach(card => {
    const matchesStatus = currentStatus === 'all' || card.dataset.status === currentStatus;
    const matchesSearch = !currentSearch || card.dataset.title.includes(currentSearch);
    const show = matchesStatus && matchesSearch;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  if (visible === 0 && allItems.length > 0) {
    list.style.display = 'none';
    const hint = currentSearch
      ? `Ничего не найдено по запросу «${esc(currentSearch)}»`
      : 'В этой категории пока пусто';
    noResults.innerHTML = hint;
    noResults.style.display = 'block';
    shown.style.display = 'none';
  } else {
    list.style.display = '';
    noResults.style.display = 'none';
    if (currentStatus !== 'all' || currentSearch) {
      shown.textContent = `Показано: ${visible}`;
      shown.style.display = 'block';
    } else {
      shown.style.display = 'none';
    }
  }
}

function updateCounters(items) {
  const counts = { all: items.length, pending: 0, watching: 0, watched: 0 };
  items.forEach(it => { counts[it.status] = (counts[it.status] || 0) + 1; });
  document.getElementById('cnt-all').textContent       = counts.all;
  document.getElementById('cnt-pending').textContent   = counts.pending;
  document.getElementById('cnt-watching').textContent  = counts.watching;
  document.getElementById('cnt-watched').textContent   = counts.watched;
  document.getElementById('counter-watched').textContent = counts.watched;
  document.getElementById('counter-total').textContent   = counts.all;
}

function render(items) {
  const list = document.getElementById('list');
  const sorted = sortAnime(items);
  list.innerHTML = sorted.map(buildCard).join('');
  list.style.display = '';
}

document.querySelectorAll('#status-filters .f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#status-filters .f-btn').forEach(b => b.classList.remove('is-active'));
    btn.classList.add('is-active');
    currentStatus = btn.dataset.status;
    applyFilters();
  });
});
document.getElementById('search').addEventListener('input', e => {
  currentSearch = (e.target.value || '').trim().toLowerCase();
  applyFilters();
});

async function loadAll() {
  const status = document.getElementById('status');
  const list = document.getElementById('list');
  status.classList.remove('error-state');
  status.classList.add('empty-state');
  status.style.display = 'block';
  status.textContent = 'Загружаю заказы...';
  list.style.display = 'none';

  try {
    const [animeRes, viewersRes] = await Promise.all([
      fetch(ANIME_CSV_URL),
      VIEWERS_CSV_URL ? fetch(VIEWERS_CSV_URL) : Promise.resolve(null),
    ]);

    if (!animeRes.ok) throw new Error('HTTP ' + animeRes.status + ' при загрузке листа Anime');

    let viewersMap = {};
    if (viewersRes && viewersRes.ok) {
      const csv = await viewersRes.text();
      viewersMap = rowsToViewers(parseCSV(csv));
    }

    const csv = await animeRes.text();
    allItems = rowsToAnime(parseCSV(csv), viewersMap);

    if (allItems.length === 0) {
      status.style.display = 'block';
      status.innerHTML = 'Пока ни одного заказа аниме.<br>Добавь первую строку в Google-таблицу — и она появится здесь.';
      updateCounters(allItems);
      return;
    }

    updateCounters(allItems);
    render(allItems);
    status.style.display = 'none';
    applyFilters();
  } catch (err) {
    console.error(err);
    status.className = 'error-state';
    status.innerHTML = '⚠ Не удалось загрузить данные.<br>' + esc(err.message) +
      '<br><button class="reload-btn" onclick="loadAll()">Обновить</button>';
  }
}

loadAll();
setInterval(loadAll, 60000);
</script>
