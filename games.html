<script>
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { cell += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c === '\r') {}
      else { cell += c; }
    }
  }
  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(c => c.length > 0)) rows.push(row);
  }
  return rows;
}

function rowsToViewers(rows) {
  if (rows.length < 2) return {};
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const nickIdx = headers.indexOf('nick');
  const avatarIdx = headers.indexOf('avatar_url');
  const twitchIdx = headers.indexOf('twitch_url');
  if (nickIdx < 0) return {};
  const map = {};
  rows.slice(1).forEach(r => {
    if (r.length > 0 && r[nickIdx] && r[nickIdx].trim()) {
      const nick = r[nickIdx].trim();
      map[nick.toLowerCase()] = {
        nick: nick,
        avatar:    avatarIdx >= 0 ? (r[avatarIdx] || '').trim() : '',
        twitchUrl: twitchIdx >= 0 ? (r[twitchIdx] || '').trim() : '',
      };
    }
  });
  return map;
}

function rowsToGames(rows, viewersMap) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const idx = {
    nick:             headers.indexOf('nick'),
    title:            headers.indexOf('title'),
    progress_percent: headers.indexOf('progress_percent'),
    hours_played:     headers.indexOf('hours_played'),
    status:           headers.indexOf('status'),
    rating:           headers.indexOf('rating'),
    cover_url:        headers.indexOf('cover_url'),
    date_added:       headers.indexOf('date_added'),
    date_completed:   headers.indexOf('date_completed'),
    url:              headers.indexOf('url'),
    notes:            headers.indexOf('notes'),
  };
  if (idx.nick < 0 || idx.title < 0) return [];
  return rows.slice(1)
    .filter(r => r.length > 0 && r[idx.nick] && r[idx.nick].trim() && r[idx.title] && r[idx.title].trim())
    .map((r, i) => {
      const get = (col) => col >= 0 ? (r[col] || '').trim() : '';
      const nick = get(idx.nick);
      const viewer = viewersMap[nick.toLowerCase()] || {};
      const rawStatus = get(idx.status).toLowerCase();
      const status = ['pending', 'playing', 'completed', 'dropped'].includes(rawStatus) ? rawStatus : 'pending';
      const progressRaw = get(idx.progress_percent).replace(',', '.');
      const progressNum = progressRaw ? parseFloat(progressRaw) : 0;
      const hoursRaw = get(idx.hours_played).replace(',', '.');
      const hoursNum = hoursRaw ? parseFloat(hoursRaw) : 0;
      const ratingRaw = get(idx.rating).replace(',', '.');
      const ratingNum = ratingRaw ? parseFloat(ratingRaw) : NaN;
      return {
        _order: i,
        nick: nick,
        avatar:    viewer.avatar || '',
        twitchUrl: viewer.twitchUrl || '',
        title: get(idx.title),
        progress_percent: isFinite(progressNum) ? progressNum : 0,
        hours_played: isFinite(hoursNum) ? hoursNum : 0,
        status: status,
        rating: isFinite(ratingNum) ? ratingNum : null,
        cover_url: get(idx.cover_url),
        date_added: get(idx.date_added),
        date_completed: get(idx.date_completed),
        url: get(idx.url),
        notes: get(idx.notes),
      };
    });
}

const STATUS_WEIGHT = { playing: 0, pending: 1, completed: 2, dropped: 3 };
function parseDateTs(d) {
  if (!d) return 0;
  const t = Date.parse(d);
  return isNaN(t) ? 0 : t;
}

function sortItems(items, currentStatus) {
  return items.slice().sort((a, b) => {
    if (currentStatus === 'completed' || currentStatus === 'dropped') {
      const da = parseDateTs(a.date_completed);
      const db = parseDateTs(b.date_completed);
      if (da !== db) return db - da;
      return a._order - b._order;
    }
    const sw = (STATUS_WEIGHT[a.status] ?? 9) - (STATUS_WEIGHT[b.status] ?? 9);
    if (sw !== 0) return sw;
    const da = parseDateTs(a.date_added);
    const db = parseDateTs(b.date_added);
    if (da !== db) return db - da;
    return a._order - b._order;
  });
}

function initials(nick) {
  const clean = nick.replace(/[^A-Za-zА-Яа-я0-9]/g, '');
  if (clean.length >= 2) return (clean[0] + clean[1]).toUpperCase();
  return (clean[0] || '?').toUpperCase();
}

function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  const palette = [
    '#7F77DD', '#FAC775', '#97C459', '#F0997B', '#88B4F5',
    '#C5A9F8', '#F38787', '#F0BC58', '#6FA13C', '#D85A30',
  ];
  return palette[Math.abs(h) % palette.length];
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function isHttpUrl(s) {
  if (!s) return false;
  try {
    const u = new URL(s);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch (e) { return false; }
}

function formatRating(r) {
  if (r === null || r === undefined || !isFinite(r)) return '';
  if (Number.isInteger(r)) return String(r);
  return (Math.round(r * 10) / 10).toFixed(1);
}

function formatHours(h) {
  if (!h || !isFinite(h)) return '0';
  if (Number.isInteger(h)) return String(h);
  return (Math.round(h * 10) / 10).toFixed(1);
}

const MONTHS_RU = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
function formatShortDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getDate()} ${MONTHS_RU[d.getMonth()]} ${d.getFullYear()}`;
}

const STATUS_LABEL = {
  pending:   'В очереди',
  playing:   'Играем',
  completed: 'Пройдено',
  dropped:   'Дропнуто',
};

function buildAvatarHtml(item) {
  if (item.avatar) {
    return `<div class="gcard__avatar" style="background-image:url('${esc(item.avatar)}');"></div>`;
  }
  const color = hashColor(item.nick.toLowerCase());
  return `<div class="gcard__avatar" style="background:${color};">${esc(initials(item.nick))}</div>`;
}

function buildNickHtml(item) {
  if (item.twitchUrl && isHttpUrl(item.twitchUrl)) {
    return `<a class="gcard__nick" href="${esc(item.twitchUrl)}" target="_blank" rel="noopener">${esc(item.nick)}</a>`;
  }
  return `<span class="gcard__nick">${esc(item.nick)}</span>`;
}

function buildBadgesHtml(item) {
  const badges = [];
  badges.push(`<span class="badge badge--${item.status}">${esc(STATUS_LABEL[item.status])}</span>`);
  const ratingTxt = formatRating(item.rating);
  if (ratingTxt) badges.push(`<span class="badge badge--rating">★ ${esc(ratingTxt)}</span>`);
  if (item.date_completed) {
    const verb = item.status === 'dropped' ? 'дропнуто' : 'пройдено';
    badges.push(`<span class="gcard__date">${verb} ${esc(formatShortDate(item.date_completed))}</span>`);
  } else if (item.date_added && item.status !== 'completed' && item.status !== 'dropped') {
    badges.push(`<span class="gcard__date">добавлено ${esc(formatShortDate(item.date_added))}</span>`);
  }
  return `<div class="gcard__badges">${badges.join('')}</div>`;
}

function buildProgressHtml(item) {
  let pct = Math.max(0, Math.min(100, Math.round(item.progress_percent || 0)));
  if (item.status === 'completed') pct = 100;
  const fillClass = `progress__fill--${item.status}`;
  return `
    <div class="progress">
      <div class="progress__label">
        <span>Прогресс</span>
        <span class="pct">${pct}%</span>
      </div>
      <div class="progress__bar">
        <div class="progress__fill ${fillClass}" style="width:${pct}%;"></div>
      </div>
    </div>
  `;
}

function buildHoursHtml(item) {
  if (!item.hours_played || item.hours_played <= 0) return '';
  const txt = formatHours(item.hours_played);
  return `<p class="gcard__hours"><span class="accent">${esc(txt)}</span> ч сыграно</p>`;
}

function buildCoverHtml(item) {
  if (!item.cover_url || !isHttpUrl(item.cover_url)) return '';
  const inner = `<img src="${esc(item.cover_url)}" alt="${esc(item.title)}" loading="lazy" onerror="this.parentNode.style.display='none';">`;
  if (item.url && isHttpUrl(item.url)) {
    return `<a class="gcard__cover" href="${esc(item.url)}" target="_blank" rel="noopener" aria-label="Открыть страницу игры">${inner}</a>`;
  }
  return `<div class="gcard__cover">${inner}</div>`;
}

function buildCard(item) {
  const titleInner = item.url
    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a>`
    : esc(item.title);
  const cover = buildCoverHtml(item);
  let stateClasses = '';
  if (item.status === 'completed' || item.status === 'dropped') stateClasses += ' is-done';
  if (item.status === 'completed') stateClasses += ' is-completed';
  if (item.status === 'dropped')   stateClasses += ' is-dropped';
  const noCoverClass = cover ? '' : ' no-cover';
  return `
    <article class="gcard${stateClasses}${noCoverClass}" data-status="${esc(item.status)}" data-title="${esc(item.title.toLowerCase())}" data-nick="${esc(item.nick.toLowerCase())}">
      ${buildAvatarHtml(item)}
      <div class="gcard__body">
        ${buildNickHtml(item)}
        <h2 class="gcard__title">${titleInner}</h2>
        ${buildBadgesHtml(item)}
        ${buildProgressHtml(item)}
        ${buildHoursHtml(item)}
        ${item.notes ? `<p class="gcard__notes">${esc(item.notes)}</p>` : ''}
      </div>
      ${cover}
    </article>
  `;
}

let allItems = [];
let currentStatus = 'all';
let currentSearchTitle = '';
let currentSearchNick = '';

function applyFilters() {
  const list = document.getElementById('list');
  const noResults = document.getElementById('no-results');
  const shown = document.getElementById('shown-count');

  let visible = 0;
  list.querySelectorAll('.gcard').forEach(card => {
    const cardStatus = card.dataset.status;
    let matchesStatus;
    if (currentStatus === 'all') {
      matchesStatus = cardStatus !== 'completed' && cardStatus !== 'dropped';
    } else {
      matchesStatus = cardStatus === currentStatus;
    }
    const matchesTitle = !currentSearchTitle || card.dataset.title.includes(currentSearchTitle);
    const matchesNick  = !currentSearchNick  || card.dataset.nick.includes(currentSearchNick);
    const show = matchesStatus && matchesTitle && matchesNick;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  if (visible === 0 && allItems.length > 0) {
    list.style.display = 'none';
    let hint;
    if (currentSearchTitle || currentSearchNick) {
      const parts = [];
      if (currentSearchTitle) parts.push(`«${esc(currentSearchTitle)}»`);
      if (currentSearchNick)  parts.push(`заказчик «${esc(currentSearchNick)}»`);
      hint = `Ничего не найдено по ${parts.join(', ')}`;
    } else {
      hint = 'В этой категории пока пусто';
    }
    noResults.innerHTML = hint;
    noResults.style.display = 'block';
    shown.style.display = 'none';
  } else {
    list.style.display = '';
    noResults.style.display = 'none';
    if (currentStatus !== 'all' || currentSearchTitle || currentSearchNick) {
      shown.textContent = `Показано: ${visible}`;
      shown.style.display = 'block';
    } else {
      shown.style.display = 'none';
    }
  }
}

function updateCounters(items) {
  const counts = { pending: 0, playing: 0, completed: 0, dropped: 0 };
  items.forEach(it => { counts[it.status] = (counts[it.status] || 0) + 1; });
  const activeCount = counts.pending + counts.playing;
  document.getElementById('cnt-all').textContent       = activeCount;
  document.getElementById('cnt-pending').textContent   = counts.pending;
  document.getElementById('cnt-playing').textContent   = counts.playing;
  document.getElementById('cnt-completed').textContent = counts.completed;
  document.getElementById('cnt-dropped').textContent   = counts.dropped;
  document.getElementById('counter-completed').textContent = counts.completed;
  document.getElementById('counter-dropped').textContent   = counts.dropped;
  document.getElementById('counter-total').textContent     = items.length;
}

function render(items, filterForSort) {
  const list = document.getElementById('list');
  const sorted = sortItems(items, filterForSort);
  list.innerHTML = sorted.map(buildCard).join('');
  list.style.display = '';
}

document.querySelectorAll('#status-filters .f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#status-filters .f-btn').forEach(b => b.classList.remove('is-active'));
    btn.classList.add('is-active');
    currentStatus = btn.dataset.status;
    render(allItems, currentStatus);
    applyFilters();
  });
});
document.getElementById('search-title').addEventListener('input', e => {
  currentSearchTitle = (e.target.value || '').trim().toLowerCase();
  applyFilters();
});
document.getElementById('search-nick').addEventListener('input', e => {
  currentSearchNick = (e.target.value || '').trim().toLowerCase();
  applyFilters();
});

async function loadAll() {
  const status = document.getElementById('status');
  const list = document.getElementById('list');
  status.classList.remove('error-state');
  status.classList.add('empty-state');
  status.style.display = 'block';
  status.textContent = 'Загружаю заказы...';
  list.style.display = 'none';

  try {
    const [gamesRes, viewersRes] = await Promise.all([
      fetch(GAMES_CSV_URL),
      VIEWERS_CSV_URL ? fetch(VIEWERS_CSV_URL) : Promise.resolve(null),
    ]);

    if (!gamesRes.ok) throw new Error('HTTP ' + gamesRes.status + ' при загрузке листа Games');

    let viewersMap = {};
    if (viewersRes && viewersRes.ok) {
      const csv = await viewersRes.text();
      viewersMap = rowsToViewers(parseCSV(csv));
    }

    const csv = await gamesRes.text();
    allItems = rowsToGames(parseCSV(csv), viewersMap);

    if (allItems.length === 0) {
      status.style.display = 'block';
      status.innerHTML = 'Пока ни одного заказа игр.<br>Добавь первую строку в Google-таблицу — и она появится здесь.';
      updateCounters(allItems);
      return;
    }

    updateCounters(allItems);
    render(allItems, currentStatus);
    status.style.display = 'none';
    applyFilters();
  } catch (err) {
    console.error(err);
    status.className = 'error-state';
    status.innerHTML = '⚠ Не удалось загрузить данные.<br>' + esc(err.message) +
      '<br><button class="reload-btn" onclick="loadAll()">Обновить</button>';
  }
}

loadAll();
setInterval(loadAll, 60000);
</script>
