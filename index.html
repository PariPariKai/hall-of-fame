<script>
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { cell += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c === '\r') {}
      else { cell += c; }
    }
  }
  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(c => c.length > 0)) rows.push(row);
  }
  return rows;
}

function rowsToConfig(rows) {
  if (rows.length < 2) return {};
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const keyIdx = headers.indexOf('key');
  const valIdx = headers.indexOf('value');
  if (keyIdx < 0 || valIdx < 0) return {};
  const config = {};
  rows.slice(1).forEach(r => {
    if (r.length > 0 && r[keyIdx]) {
      config[r[keyIdx].trim().toLowerCase()] = (r[valIdx] || '').trim();
    }
  });
  return config;
}

function isValidUrl(s) {
  if (!s) return false;
  try {
    const u = new URL(s);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch (e) {
    return false;
  }
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function rowsToCount(rows) {
  if (rows.length < 2) return 0;
  return rows.slice(1).filter(r => r.some(c => (c || '').trim().length > 0)).length;
}

function getColIdx(rows, name) {
  if (rows.length < 1) return -1;
  return rows[0].map(h => h.trim().toLowerCase()).indexOf(name.toLowerCase());
}

function summarizeStatusList(rows, statusGroups) {
  // statusGroups example: { active: ['pending','watching'], done: ['watched'] }
  const idx = getColIdx(rows, 'status');
  if (idx < 0 || rows.length < 2) {
    const out = {};
    Object.keys(statusGroups).forEach(k => out[k] = 0);
    out.total = 0;
    return out;
  }
  const out = {};
  Object.keys(statusGroups).forEach(k => out[k] = 0);
  out.total = 0;
  rows.slice(1).forEach(r => {
    if (!r.some(c => (c || '').trim().length > 0)) return;
    const status = (r[idx] || '').trim().toLowerCase();
    out.total++;
    Object.keys(statusGroups).forEach(group => {
      if (statusGroups[group].includes(status)) out[group]++;
    });
  });
  return out;
}

function summarizeTickets(rows) {
  const silverIdx = getColIdx(rows, 'silver');
  const goldIdx = getColIdx(rows, 'gold');
  if (rows.length < 2) return { participants: 0, totalTickets: 0 };
  let participants = 0;
  let totalTickets = 0;
  rows.slice(1).forEach(r => {
    if (!r.some(c => (c || '').trim().length > 0)) return;
    const silver = parseInt((silverIdx >= 0 ? (r[silverIdx] || '0') : '0').trim(), 10) || 0;
    const gold = parseInt((goldIdx >= 0 ? (r[goldIdx] || '0') : '0').trim(), 10) || 0;
    if (silver + gold > 0) {
      participants++;
      totalTickets += silver + gold;
    }
  });
  return { participants, totalTickets };
}

function setCounter(key, html) {
  const el = document.querySelector(`[data-counter="${key}"]`);
  if (el) el.innerHTML = html;
}

function applyConfig(config) {
  const name = (config.streamer_name || '').trim();
  const intro = (config.streamer_intro || '').trim();
  const avatar = (config.streamer_avatar_url || '').trim();
  const twitch = (config.streamer_twitch_url || '').trim();

  if (name) {
    document.getElementById('hero-name').textContent = name;
    document.title = name;
    const initials = name.replace(/[^A-Za-zА-Яа-я0-9]/g, '').slice(0, 2).toUpperCase() || 'PK';
    document.getElementById('hero-avatar-fallback').textContent = initials;
  }
  if (intro) {
    document.getElementById('hero-intro').textContent = intro;
  }

  if (isValidUrl(avatar)) {
    const img = document.getElementById('hero-avatar');
    const fb = document.getElementById('hero-avatar-fallback');
    img.onload = () => { img.style.display = 'block'; fb.style.display = 'none'; };
    img.onerror = () => { img.style.display = 'none'; fb.style.display = ''; };
    img.src = avatar;
    img.alt = name || 'Avatar';
  }

  if (isValidUrl(twitch)) {
    const cta = document.getElementById('hero-cta');
    cta.href = twitch;
    cta.classList.remove('hero__cta--hidden');
  }
}

async function loadAndCount(url, key, mapper, fallbackText) {
  if (!url) {
    setCounter(key, '—');
    return;
  }
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    setCounter(key, mapper(rows));
  } catch (err) {
    console.warn(`Counter "${key}" failed:`, err.message);
    setCounter(key, fallbackText || '—');
  }
}

async function loadAll() {
  // Config first (controls hero rendering)
  fetch(CONFIG_CSV_URL)
    .then(r => r.ok ? r.text() : Promise.reject(new Error('Config HTTP ' + r.status)))
    .then(text => applyConfig(rowsToConfig(parseCSV(text))))
    .catch(err => console.warn('Config load failed:', err.message));

  // 6 counters in parallel — each independently survives errors
  loadAndCount(WINNERS_CSV_URL, 'hall', (rows) => {
    const n = rowsToCount(rows);
    return `<span class="accent">${n}</span> ${n === 1 ? 'победа' : (n >= 2 && n <= 4 ? 'победы' : 'побед')}`;
  });

  loadAndCount(TICKETS_CSV_URL, 'tickets', (rows) => {
    const t = summarizeTickets(rows);
    if (t.participants === 0) return 'нет участников';
    return `<span class="accent">${t.participants}</span> участников · <span class="accent">${t.totalTickets}</span> билетов`;
  });

  loadAndCount(ANIME_CSV_URL, 'anime', (rows) => {
    const s = summarizeStatusList(rows, { active: ['pending','watching'], done: ['watched'] });
    if (s.total === 0) return 'пока пусто';
    return `<span class="accent">${s.active}</span> в очереди · <span class="accent">${s.done}</span> просмотрено`;
  });

  loadAndCount(MOVIES_CSV_URL, 'movies', (rows) => {
    const s = summarizeStatusList(rows, { active: ['pending','watching'], done: ['watched'] });
    if (s.total === 0) return 'пока пусто';
    return `<span class="accent">${s.active}</span> в очереди · <span class="accent">${s.done}</span> просмотрено`;
  });

  loadAndCount(SERIES_CSV_URL, 'series', (rows) => {
    const s = summarizeStatusList(rows, { active: ['pending','watching'], done: ['watched'] });
    if (s.total === 0) return 'пока пусто';
    return `<span class="accent">${s.active}</span> в очереди · <span class="accent">${s.done}</span> просмотрено`;
  });

  loadAndCount(GAMES_CSV_URL, 'games', (rows) => {
    const s = summarizeStatusList(rows, { pending: ['pending'], playing: ['playing'] });
    if (s.total === 0) return 'пока пусто';
    return `<span class="accent">${s.pending}</span> в очереди · <span class="accent">${s.playing}</span> играем`;
  });
}

loadAll();
</script>
